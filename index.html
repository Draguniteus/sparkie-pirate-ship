<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparkie — Pirate Ship Deck</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #050a12; font-family: 'Georgia', serif; }
    canvas { display: block; }
    #hint { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); color: rgba(180,150,100,0.4); font-size: 12px; letter-spacing: 0.08em; pointer-events: none; opacity: 1; transition: opacity 2s ease; }
    #title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(160,130,80,0.4); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; }
  </style>
</head>
<body>
<div id="title">🏴‍☠️ PIRATE SHIP DECK ⚓</div>
<div id="hint">drag to orbit</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a12);
scene.fog = new THREE.FogExp2(0x050a12, 0.012);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 300);
camera.position.set(0, 6, 25);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.08;
controls.maxPolarAngle = Math.PI * 0.55;
controls.minDistance = 5;
controls.maxDistance = 50;

scene.add(new THREE.AmbientLight(0x1a2030, 0.4));

// Deck planks
const deckGeo = new THREE.PlaneGeometry(20, 30, 20, 30);
const deckMat = new THREE.ShaderMaterial({
  uniforms: {},
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    varying vec2 vUv;
    float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5); }
    void main() {
      float plank = step(0.5, fract(vUv.y * 15.0));
      float grain = hash(floor(vUv * vec2(20, 15))) * 0.15;
      vec3 wood = vec3(0.25, 0.15, 0.08) + grain;
      vec3 dark = vec3(0.15, 0.1, 0.05);
      vec3 col = mix(wood, dark, plank * 0.5);
      gl_FragColor = vec4(col, 1.0);
    }
  `
});
const deck = new THREE.Mesh(deckGeo, deckMat);
deck.rotation.x = -Math.PI / 2;
deck.position.y = 0;
scene.add(deck);

// Hull
const hullMat = new THREE.MeshStandardMaterial({ color: 0x3a2010, roughness: 0.9 });
const hull = new THREE.Mesh(new THREE.BoxGeometry(22, 4, 32), hullMat);
hull.position.set(0, -2, 0);
scene.add(hull);

// Hull ribs
for (let r = 0; r < 8; r++) {
  const rib = new THREE.Mesh(
    new THREE.TorusGeometry(4 - r * 0.3, 0.3, 8, 16, Math.PI),
    new THREE.MeshStandardMaterial({ color: 0x2a1508 })
  );
  rib.position.set(0, -2, -12 + r * 4);
  rib.rotation.x = Math.PI / 2;
  scene.add(rib);
}

// Mast
const mastMat = new THREE.MeshStandardMaterial({ color: 0x4a3020, roughness: 0.9 });
const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 25, 12), mastMat);
mast.position.set(0, 12.5, 2);
scene.add(mast);

// Crow's nest
const nest = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.2, 1.5, 12), hullMat);
nest.position.set(0, 22, 2);
scene.add(nest);

// Sail
const sailMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    varying vec2 vUv;
    uniform float uTime;
    void main() {
      float bulge = sin(vUv.y * 10.0 + uTime * 0.5) * 0.2 * vUv.y;
      float edge = 1.0 - abs(vUv.x - 0.5 - bulge) * 2.0;
      vec3 col = vec3(0.85, 0.8, 0.7);
      gl_FragColor = vec4(col, edge * 0.9);
    }
  `,
  transparent: true, side: THREE.DoubleSide
});
const sail = new THREE.Mesh(new THREE.PlaneGeometry(8, 12), sailMat);
sail.position.set(0, 18, 2);
sail.userData.isSail = true;
scene.add(sail);

// Yard arm
const yard = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 10, 8), mastMat);
yard.rotation.z = Math.PI / 2;
yard.position.set(0, 22, 2);
scene.add(yard);

// Wheel
const wheelMat = new THREE.MeshStandardMaterial({ color: 0x3a2515, metalness: 0.3, roughness: 0.8 });
const wheel = new THREE.Mesh(new THREE.TorusGeometry(1.5, 0.15, 8, 20), wheelMat);
wheel.position.set(0, 5, 10);
wheel.rotation.x = Math.PI / 2;
scene.add(wheel);

// Wheel spokes
for (let s = 0; s < 8; s++) {
  const angle = (s / 8) * Math.PI * 2;
  const spoke = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1.5, 6), wheelMat);
  spoke.rotation.z = angle;
  spoke.position.set(0, 5, 10);
  wheel.add(spoke);
}

// Compass
const compass = new THREE.Mesh(
  new THREE.CylinderGeometry(0.3, 0.3, 0.1, 16),
  new THREE.MeshStandardMaterial({ color: 0x888877 })
);
compass.position.set(0, 5.1, 10);
scene.add(compass);

// Cannons
for (let c = 0; c < 4; c++) {
  const cannon = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.25, 2, 12),
    new THREE.MeshStandardMaterial({ color: 0x2a2a2a, metalness: 0.7, roughness: 0.3 })
  );
  cannon.rotation.x = Math.PI / 2;
  cannon.position.set(-5 + c * 3.5, 1.5, -5);
  scene.add(cannon);
  
  const wheel2 = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4, 0.4, 0.2, 12),
    new THREE.MeshStandardMaterial({ color: 0x1a1a1a })
  );
  wheel2.rotation.z = Math.PI / 2;
  wheel2.position.set(-5 + c * 3.5, 0.5, -5);
  scene.add(wheel2);
}

// Anchor
const anchorMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, metalness: 0.8, roughness: 0.4 });
const anchor = new THREE.Group();
const anchorShaft = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 3, 8), anchorMat);
anchorShaft.rotation.z = Math.PI / 2;
anchor.add(anchorShaft);
const anchorRing = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.08, 8, 16), anchorMat);
anchorRing.position.set(1.8, 0, 0);
anchor.add(anchorRing);
const anchorFluke = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.15), anchorMat);
anchorFluke.position.set(-1.5, 0.4, 0);
anchor.add(anchorFluke);
anchor.position.set(8, 2, 10);
scene.add(anchor);

// Barrels
for (let b = 0; b < 8; b++) {
  const barrel = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4, 0.4, 0.8, 12),
    new THREE.MeshStandardMaterial({ color: 0x4a2a10, roughness: 0.85 })
  );
  barrel.position.set(-7 + (b % 4) * 1.5, 0.5, 8 + Math.floor(b / 4) * 2);
  scene.add(barrel);
}

// Ropes
for (let r = 0; r < 6; r++) {
  const ropeMat = new THREE.MeshStandardMaterial({ color: 0x8a7a60, roughness: 0.95 });
  const rope = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 15 + Math.random() * 5, 6), ropeMat);
  rope.position.set(-8 + r * 3.5, 8 + Math.random() * 5, 0);
  rope.rotation.z = (Math.random() - 0.5) * 0.3;
  scene.add(rope);
}

// Crates
for (let c = 0; c < 6; c++) {
  const crate = new THREE.Mesh(
    new THREE.BoxGeometry(0.8 + Math.random() * 0.4, 0.8 + Math.random() * 0.4, 0.8 + Math.random() * 0.4),
    new THREE.MeshStandardMaterial({ color: 0x5a4020, roughness: 0.9 })
  );
  crate.position.set(6 + (c % 3) * 1.2, 0.5 + Math.random() * 0.3, -8 + Math.floor(c / 3) * 2);
  crate.rotation.y = Math.random() * 0.3;
  scene.add(crate);
}

// Lanterns
for (let l = 0; l < 4; l++) {
  const lantern = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0xffcc66, emissive: 0xff8800, emissiveIntensity: 2.0 })
  );
  lantern.position.set(-8, 8, -8 + l * 5);
  scene.add(lantern);
  
  const lLight = new THREE.PointLight(0xff8833, 2, 10);
  lLight.position.set(-8, 8, -8 + l * 5);
  scene.add(lLight);
}

// Ocean waves
const waveCount = 100;
const wavePos = new Float32Array(waveCount * 3);
for (let i = 0; i < waveCount; i++) {
  wavePos[i*3] = (Math.random() - 0.5) * 80;
  wavePos[i*3+1] = -3;
  wavePos[i*3+2] = (Math.random() - 0.5) * 80;
}
const waveGeo = new THREE.BufferGeometry();
waveGeo.setAttribute('position', new THREE.BufferAttribute(wavePos, 3));
const waveMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    uniform float uTime;
    void main() {
      vec3 p = position;
      p.y += sin(p.x * 0.3 + uTime) * 1.5 + cos(p.z * 0.2 + uTime * 0.8) * 0.8;
      gl_PointSize = 8.0;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: `
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float a = 1.0 - d * 2.0;
      vec3 col = vec3(0.1, 0.3, 0.5);
      gl_FragColor = vec4(col, a * 0.5);
    }
  `,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
});
const waves = new THREE.Points(waveGeo, waveMat);
waves.userData.isWaves = true;
scene.add(waves);

// Stars
const starCount = 1200;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const r = 100 + Math.random() * 50;
  starPos[i*3] = Math.cos(theta) * r;
  starPos[i*3+1] = 20 + Math.random() * 60;
  starPos[i*3+2] = Math.sin(theta) * r;
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.4, sizeAttenuation: true })));

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  
  if (sail.userData.isSail && sail.material.uniforms.uTime) sail.material.uniforms.uTime.value = t;
  if (waves.userData.isWaves) waves.material.uniforms.uTime.value = t;
  
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);
</script>
</body>
</html>
